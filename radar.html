<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mason's Weather Radar</title>
    <!-- FontAwesome 6 for Professional Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d1117;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        /* Fullscreen Map Frame Container */
        #map-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* COMMON GLASSMORPHIC STYLING FOR OVERLAYS */
        .brand-overlay {
            position: absolute;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.95); /* Slightly darker to ensure zero bleed-through */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px 24px;
            border-radius: 30px; /* Rounded pill shape fits perfectly over the top-center logo */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
            pointer-events: auto;
        }

        /* TOP CENTER: Directly blocks the red Windy logo */
        #top-center-brand {
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 260px;
            justify-content: center;
        }

        #top-center-brand i {
            color: #3b82f6;
            font-size: 20px;
            animation: pulse-glow 2.5s infinite ease-in-out;
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .brand-title {
            color: #ffffff;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
            margin: 0;
            line-height: 1.2;
        }

        .brand-subtitle {
            color: #94a3b8;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 0;
            margin-top: 1px;
            line-height: 1;
        }

    </style>
</head>
<body>

    <div id="map-container">
        
        <!-- TOP CENTER OVERLAY (Planted directly over Windy's center logo) -->
<div id="top-center-brand" class="brand-overlay"> 
  <a href="index.html" style="display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit;">
    <i class="fa-solid fa-satellite-dish"></i> 
    <div class="brand-text" style="display: flex; flex-direction: column; align-items: flex-start;"> 
      <span class="brand-title">Mason's Weather Radar</span> 
      <span class="brand-subtitle">Live Tracking System</span> 
    </div> 
  </a>
</div>




        <!-- Fullscreen Windy Embed -->
        <iframe src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=default&metricTemp=default&metricWind=default&zoom=5&overlay=radar&product=radar&level=surface&lat=38&lon=-95" allowfullscreen></iframe>
        
    </div>

</body>
</html>
